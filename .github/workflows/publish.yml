name: Publish to npm

# Triggers on any v* tag — push the tag manually or via a release.
# The workflow reads the tag, bumps package.json to match, commits it
# back to main, then builds and publishes to npm.
#
# Required secrets:
#   AUTOMATION_TOKEN — fine-grained PAT with Contents: Read & write
#                      + Workflows: Read & write on this repo
#                      (used to push the version-bump commit back to main)
#
# Publishing uses npm Trusted Publishers (OIDC) — no NODE_AUTH_TOKEN needed.
# Configure it at: https://www.npmjs.com/package/oidc-auth-client/access

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTOMATION_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Sync lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Build package
        run: npm run build

      - name: Validate package
        run: npm run test:package

      - name: Publish to npm
        run: npm publish --access public --provenance
