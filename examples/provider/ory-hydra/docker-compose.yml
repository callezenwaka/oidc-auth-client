version: '3.8'

services:
  # PostgreSQL database for Hydra
  postgres:
    image: postgres:14-alpine
    container_name: hydra-postgres
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: hydra
    ports:
      - "5432:5432"
    volumes:
      - hydra-postgres-data:/var/lib/postgresql/data
    networks:
      - hydra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Run Hydra migrations
  hydra-migrate:
    image: oryd/hydra:v2.2
    container_name: hydra-migrate
    environment:
      DSN: postgres://hydra:secret@postgres:5432/hydra?sslmode=disable
    command: migrate sql -e --yes
    networks:
      - hydra-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # Ory Hydra OAuth2/OIDC server
  hydra:
    image: oryd/hydra:v2.2
    container_name: hydra
    ports:
      - "4444:4444" # Public API (for clients)
      - "4445:4445" # Admin API (for management)
    environment:
      # Database
      DSN: postgres://hydra:secret@postgres:5432/hydra?sslmode=disable

      # Hydra configuration
      URLS_SELF_ISSUER: http://localhost:4444
      URLS_CONSENT: http://localhost:3000/consent
      URLS_LOGIN: http://localhost:3000/login
      URLS_LOGOUT: http://localhost:3000/logout

      # Security (dev mode - change in production)
      SECRETS_SYSTEM: youReallyNeedToChangeThis

      # CORS
      SERVE_PUBLIC_CORS_ENABLED: "true"
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      SERVE_ADMIN_CORS_ENABLED: "true"
      SERVE_ADMIN_CORS_ALLOWED_ORIGINS: "*"

      # Token TTLs
      TTL_ACCESS_TOKEN: 1h
      TTL_REFRESH_TOKEN: 720h
      TTL_ID_TOKEN: 1h
      TTL_AUTH_CODE: 10m

      # Logging
      LOG_LEVEL: debug
      LOG_FORMAT: json
    command: serve all --dev
    networks:
      - hydra-network
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Simple login and consent UI
  login-consent-ui:
    build:
      context: ./login-consent-ui
      dockerfile: Dockerfile
    container_name: hydra-login-consent
    ports:
      - "3000:3000"
    environment:
      HYDRA_ADMIN_URL: http://hydra:4445
      NODE_ENV: development
    networks:
      - hydra-network
    depends_on:
      - hydra
    restart: unless-stopped

volumes:
  hydra-postgres-data:
    driver: local

networks:
  hydra-network:
    driver: bridge
