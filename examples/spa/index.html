<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OIDC Client - Vanilla JS SPA Example</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <nav>
        <div class="nav-brand">
          <h1>OIDC Auth Demo</h1>
        </div>
        <div class="nav-links">
          <a href="#home" class="nav-link active" data-page="home">Home</a>
          <a href="#profile" class="nav-link" data-page="profile">Profile</a>
          <a href="#api-test" class="nav-link" data-page="api-test">API Test</a>
        </div>
        <div class="nav-auth">
          <div id="auth-container"></div>
        </div>
      </nav>
    </header>

    <main id="main-content">
      <!-- Content loaded dynamically -->
    </main>
  </div>

  <!-- Templates -->
  <template id="home-template">
    <div class="page home-page">
      <h2>Welcome to OIDC Authentication Demo</h2>
      <p class="subtitle">A vanilla JavaScript example using the OIDC Client library</p>

      <div class="card">
        <h3>Getting Started</h3>
        <ol>
          <li>Click "Sign In" to authenticate</li>
          <li>You'll be redirected to your identity provider</li>
          <li>After authentication, you'll be redirected back</li>
          <li>View your profile and test authenticated API calls</li>
        </ol>
      </div>

      <div class="features">
        <div class="feature-card">
          <h4>🔐 Secure Authentication</h4>
          <p>OAuth 2.0 / OpenID Connect protocol</p>
        </div>
        <div class="feature-card">
          <h4>🔄 Auto Token Refresh</h4>
          <p>Silent token renewal before expiration</p>
        </div>
        <div class="feature-card">
          <h4>📊 Session Monitoring</h4>
          <p>Track authentication state across tabs</p>
        </div>
      </div>
    </div>
  </template>

  <template id="profile-template">
    <div class="page profile-page">
      <h2>User Profile</h2>
      <div id="profile-content"></div>
    </div>
  </template>

  <template id="api-test-template">
    <div class="page api-test-page">
      <h2>API Test</h2>
      <p>Test authenticated API calls with your access token</p>

      <div class="card">
        <h3>Make an API Request</h3>
        <div class="form-group">
          <label for="api-url">API Endpoint URL:</label>
          <input
            type="text"
            id="api-url"
            placeholder="https://api.example.com/endpoint"
            value="https://jsonplaceholder.typicode.com/users/1"
          >
        </div>
        <div class="form-group">
          <label for="http-method">HTTP Method:</label>
          <select id="http-method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
          </select>
        </div>
        <button id="test-api-btn" class="btn btn-primary">Send Request</button>
      </div>

      <div id="api-response" class="card" style="display: none;">
        <h3>Response</h3>
        <div id="response-headers"></div>
        <div id="response-body"></div>
      </div>
    </div>
  </template>

  <template id="login-button-template">
    <button class="btn btn-primary">Sign In</button>
  </template>

  <template id="user-menu-template">
    <div class="user-menu">
      <span class="user-name"></span>
      <div class="dropdown">
        <button class="btn btn-secondary dropdown-toggle">Account</button>
        <div class="dropdown-menu">
          <a href="#profile" class="dropdown-item">Profile</a>
          <button class="dropdown-item logout-btn">Sign Out</button>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
